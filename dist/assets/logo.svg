<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="neonCyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.2" />
    </linearGradient>
    <!-- Filters for AAA Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Emblem: Isometric Glowing Grid Cube -->
  <g transform="translate(10, 5)">
    <!-- Back grid line -->
    <path d="M 20,5 L 35,13 L 20,21 L 5,13 Z" fill="none" stroke="url(#neonCyanBlue)" stroke-width="1" opacity="0.3" />
    
    <!-- Outer isometric shape -->
    <path d="M 20,5 L 35,13 L 35,30 L 20,38 L 5,30 L 5,13 Z" fill="none" stroke="url(#neonCyanBlue)" stroke-width="2" filter="url(#glow)" />
    
    <!-- Inner structural lines (The Grid) -->
    <path d="M 20,5 L 20,38" fill="none" stroke="url(#neonCyanBlue)" stroke-width="1.5" opacity="0.8" />
    <path d="M 5,13 L 20,21 L 35,13" fill="none" stroke="url(#neonCyanBlue)" stroke-width="1.5" opacity="0.8" />
    <path d="M 5,30 L 20,21 L 35,30" fill="none" stroke="url(#neonCyanBlue)" stroke-width="1" opacity="0.5" />
    
    <!-- Core glowing core (Player Network Dot) -->
    <circle cx="20" cy="21" r="3" fill="#00d2ff" filter="url(#glow)" />
  </g>

  <!-- Typography: CapitalGrid -->
  <g transform="translate(52, 34)" style="font-family: 'Outfit', 'Segoe UI', sans-serif; font-weight: 900; font-size: 24px; letter-spacing: 0.5px;">
    <text x="0" y="0">
      <tspan fill="#ffffff">Capital</tspan><tspan fill="url(#neonCyanBlue)" filter="url(#glow)">Grid</tspan>
    </text>
  </g>
</svg>
